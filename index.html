<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="icon" href="spotify-removebg-preview.png">
    <title>Spotify - Web Player: Music for everyone</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="main">
        <div class="navbar">
            <div class="nav-logo">
                <i class="fa-brands fa-spotify"></i>
            </div>

            <div class="nav-left">
                <div class="home" title="Home">
                    <i class="fa-solid fa-house"></i>
                </div>

                <div class="left-form">
                  <form>
                        <div class="search" title="Search">
                        <i class="fa-solid fa-magnifying-glass"></i>
                            </div>

                        <input type="text" placeholder="What do you want to play?">

                        <div class="inp-box" title="browse">
                            <i class="fa-solid fa-box-tissue"></i>
                        </div>
                  </form>
                </div>
            </div>

                <div class="nav-right" >
                    <div class="right-ex"  title="Upgrade to Premium">Explore Premium</div>

                    <div class="right-in"> 
                        <i class="fa-regular fa-circle-down"></i>Install App
                    </div>

                    <div class="right-icons">
                        <i class="fa-regular fa-bell" title="What's New"></i>
                        <i class="fa-solid fa-users" title="Listening activity"></i>
                    </div>

                    <div class="right-pro">
                        <button>L</button>
                    </div>
                </div>
                
            

        </div>


        <div class="sidebar">Side-Bar</div>
        <div class="main-content">Main-Content</div>
        <div class="right-sidebar">Right Sidebar</div>
        <div class="music-playbar"></div>
    </div>
</body>
</html>
